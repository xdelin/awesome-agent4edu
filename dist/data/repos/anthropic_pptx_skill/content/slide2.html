<!DOCTYPE html>
<html>
<head>
  <style>
    /* 科技蓝风格 - 内容页 */
    body { 
        width: 960px; 
        height: 540px; 
        margin: 0; 
        padding: 0; 
        font-family: 'Segoe UI', Arial, sans-serif; 
        background-color: #0b1d33; 
    }
    
    .title-bar {
        margin-left: 40px;
        margin-top: 40px;
        width: 880px;
        padding-left: 20px;
        border-left: 8px solid #00d2ff;
    }
    
    h2 { 
        margin: 0; 
        font-size: 36pt; 
        color: #ffffff; 
    }
    
    .card {
        margin-left: 60px;
        margin-top: 50px;
        width: 380px;
        padding: 30px;
        background-color: #122a45; /* 稍亮的卡片背景 */
        border: 2px solid #234b75;
    }

    .card2 {
        margin-left: 500px;
        margin-top: -260px; /* 简单的双列布局hack */
        width: 380px;
        padding: 30px;
        background-color: #122a45;
        border: 2px solid #00d2ff;
    }
    
    h3 { margin: 0 0 15px 0; font-size: 24pt; color: #00d2ff; }
    
    ul { margin: 0; font-size: 18pt; color: #d0d9e6; }
    li { margin-bottom: 12pt; }
  </style>
</head>
<body>
  <div class="title-bar">
    <h2>CORE CAPABILITIES</h2>
  </div>
  
  <div class="card">
    <h3>Technical Stack</h3>
    <ul>
      <li>Python & Node.js</li>
      <li>React & Frontend</li>
      <li>System Architecture</li>
      <li>Cloud Deployment</li>
    </ul>
  </div>

  <div class="card2">
      <h3>AI Proficiency</h3>
      <ul>
        <li>Prompt Engineering</li>
        <li>RAG Integration</li>
        <li>Model Fine-tuning</li>
        <li><b>MCP Protocols</b></li>
      </ul>
    </div>
</body>
</html>
