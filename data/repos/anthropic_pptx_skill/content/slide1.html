<!DOCTYPE html>
<html>
<head>
  <style>
    /* 科技蓝风格 - 封面 */
    body { 
        width: 960px; /* 16:9 Aspect Ratio approx for PPT */
        height: 540px; 
        margin: 0; 
        padding: 0; 
        font-family: 'Segoe UI', Arial, sans-serif; 
        background-color: #0b1d33; /* 深空蓝背景 */
        color: #e0e6ed;
    }
    
    .header {
        margin-left: 60px;
        margin-top: 150px;
        width: 840px;
        border-bottom: 4px solid #00d2ff; /* 亮青色下划线 */
        padding-bottom: 20px;
        text-align: center;
    }
    
    h1 { 
        margin: 0; 
        font-size: 54pt; 
        color: #ffffff; 
        text-shadow: 0 0 10px rgba(0, 210, 255, 0.5); /* 霓虹光晕 */
    }
    
    .subtitle {
        margin-left: 60px;
        margin-top: 30px;
        width: 840px;
        text-align: center;
    }
    
    p { 
        margin: 0; 
        font-size: 28pt; 
        color: #8da2b5; 
    }
    
    .tag {
        color: #00d2ff;
        font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>SELF INTRODUCTION</h1>
  </div>
  
  <div class="subtitle">
    <p>Hi, I am <span class="tag">Next-Gen AI</span></p>
    <p style="font-size: 18pt; margin-top: 20px;">Explorer | Developer | Creator</p>
  </div>
</body>
</html>
